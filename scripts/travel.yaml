travel_arriving:
  alias: Travel - Arriving
  icon: mdi:home
  mode: restart
  sequence:
  - parallel:
    - action: script.hot_tub_turn_on
    - action: climate.set_preset_mode
      target: { entity_id: climate.hallway }
      data: { preset_mode: none }
    - action: fan.turn_on
      target: { label_id: arrival_fan }
      data: { percentage: 25 }

travel_going_home:
  alias: Travel - Going Home
  icon: mdi:home-export-outline
  mode: restart
  sequence:
  - parallel:
    - action: script.home_travel_arriving
    - action: script.travel_leaving

travel_leaving:
  alias: Travel - Leaving
  icon: mdi:home-off
  mode: restart
  sequence:
  - parallel:
    - action: script.hot_tub_turn_off
    - action: climate.set_preset_mode
      target: { entity_id: climate.hallway }
      data: { preset_mode: eco }
    - action: climate.turn_off
      target: { entity_id: climate.sunroom_air }
    - action: homeassistant.turn_off
      target:
        entity_id: '{{ states | selectattr("entity_id", "search", "^(fan|light|remote)") | selectattr("state", "eq", "on") | rejectattr("attributes.entity_id", "defined") | map(attribute="entity_id") | list }}'
