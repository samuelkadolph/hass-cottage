sleep_bedtime:
  alias: Sleep - Bedtime
  icon: mdi:bed-king
  mode: restart
  sequence:
  - parallel:
    - action: homeassistant.turn_off
      target:
        entity_id: >-
          {%- set living_room_ignore = label_entities("Sleep Ignore - Living Room") %}
          {%- set master_bedroom_ignore = label_entities("Sleep Ignore - Master Bedroom") %}
          {%- set middle_bedroom_ignore = label_entities("Sleep Ignore - Middle Bedroom") %}
          {%- set sunroom_ignore = label_entities("Sleep Ignore - Sunroom") %}
          {%- set on_stuff = states | selectattr("entity_id", "search", "^(fan|light|remote)") | selectattr("state", "eq", "on") | rejectattr("attributes.entity_id", "defined") | map(attribute="entity_id") | list %}
          {%- set turn_off = difference(on_stuff, iif(is_state("input_boolean.sleep_living_room_guest", "on"), living_room_ignore, [])) %}
          {%- set turn_off = difference(turn_off, iif(is_state("input_boolean.sleep_middle_bedroom_guest", "on"), middle_bedroom_ignore, [])) %}
          {%- set turn_off = difference(turn_off, iif(is_state("input_boolean.sleep_sunroom_guest", "on"), sunroom_ignore, [])) %}
          {%- set turn_off = difference(turn_off, master_bedroom_ignore) %}
          {{ turn_off | join(", ") }}
    - action: fan.set_percentage
      target: { entity_id: fan.master_bedroom_fan }
      data: { percentage: 75 }
    - if:
      - '{{ is_state("input_boolean.sleep_run_hvac_fan", "on") }}'
      then:
      - action: climate.set_fan_mode
        target: { entity_id: climate.hallway }
        data: { fan_mode: 'on' }
    - if:
      - '{{ is_state("person.samuel_kadolph", "Cottage") }}'
      - '{{ is_state("input_boolean.sleep_temperature_down", "on") }}'
      then:
      - choose:
        - conditions:
          - '{{ is_state("climate.hallway", "cool") }}'
          sequence:
          - action: climate.set_temperature
            target: { entity_id: climate.hallway }
            data: { temperature: '{{ state_attr("climate.hallway", "temperature") - int(states("input_number.sleep_temperature_decrement")) }}' }
        - conditions:
          - '{{ is_state("climate.hallway", "heat_cool") }}'
          sequence:
          - action: climate.set_temperature
            target: { entity_id: climate.hallway }
            data:
              target_temp_high: '{{ state_attr("climate.hallway", "target_temp_high") - int(states("input_number.sleep_temperature_decrement")) }}'
              target_temp_low: '{{ state_attr("climate.hallway", "target_temp_low") }}'
    - if:
      - '{{ is_state("input_boolean.sleep_bed_preheat", "on") }}'
      - '{{ is_state("person.sasha_keller", "Cottage") }}'
      then:
      - action: script.sleep_preheat_bed
    - if:
      - '{{ not is_state("person.sasha_keller", "Cottage") }}'
      then:
      - action: light.turn_on
        target: { entity_id: light.master_bedroom_lights }
        data: { brightness_pct: 1 }

sleep_good_morning:
  alias: Sleep - Good Morning
  icon: mdi:white-balance-sunny
  mode: restart
  sequence:
  - parallel:
    - action: climate.set_fan_mode
      target: { entity_id: climate.hallway }
      data: { fan_mode: 'off' }
    - action: light.turn_on
      target: { entity_id: light.master_bedroom_lights }
      data: { brightness_pct: 100 }

sleep_good_night:
  alias: Sleep - Good Night
  icon: mdi:sleep
  mode: restart
  sequence:
  - parallel:
    - action: light.turn_off
      target: { entity_id: light.master_bedroom_lights }

sleep_preheat_bed:
  alias: Sleep - Preheat Bed
  icon: mdi:radiator
  mode: single
  sequence:
  - if:
    - '{{ is_state("switch.master_bed_switch_b", "off") }}'
    then:
    - action: select.select_option
      target: { entity_id: select.master_bed_level_b }
      data: { option: '{{ int(states("input_number.sleep_bed_preheat_level")) }}' }
